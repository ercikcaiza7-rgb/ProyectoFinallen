<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet"
          th:href="@{/estilos.css}">
</head>

<body class="login-body">

<div class="pantalla-dividida">

    <!-- LADO IZQUIERDO -->
    <div class="lado-login">

        <div class="form-container">

            <h2>Iniciar Sesión</h2>

            <div th:if="${error}"
                 class="error-login"
                 th:text="${error}">
            </div>

            <form th:action="@{/login}"
                  method="post">

                <div class="form-group">
                    <label>Correo</label>

                    <input type="email"
                           name="correo"
                           placeholder="Ingrese su correo"
                           required>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>

                    <input type="password"
                           name="password"
                           placeholder="Ingrese su contraseña"
                           required>
                </div>

                <button type="submit"
                        class="btn-form">

                    Ingresar

                </button>

            </form>

            <div class="link-form">

                <p>¿No tienes cuenta?</p>

                <a th:href="@{/registro}">
                    Crear cuenta
                </a>

            </div>

        </div>

    </div>

    <!-- LADO DERECHO -->
    <div class="lado-imagen"></div>

</div>

<a th:href="@{/}" class="cerrar-formulario">
    ✖
</a>

</body>
</html>
